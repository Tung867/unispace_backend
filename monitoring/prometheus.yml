global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'unispace-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
        labels:
          application: 'unispace'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
