services:
  mysql:
    image: mysql:8.0
    container_name: unispace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${DB_NAME:-unispace}
      MYSQL_USER: ${DB_USERNAME:-unispace}
      MYSQL_PASSWORD: ${DB_PASSWORD:-unispace1234}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: unispace-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-unispace}
      DB_USERNAME: ${DB_USERNAME:-unispace}
      DB_PASSWORD: ${DB_PASSWORD:-unispace1234}
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLXZlcnktbG9uZy1kZWZhdWx0LXNlY3JldC1rZXktZm9yLXVuaXNwYWNlLWNoYW5nZS1tZQ==}
      GOOGLE_DRIVE_ENABLED: ${GOOGLE_DRIVE_ENABLED:-false}
      GOOGLE_CREDENTIALS_PATH: /app/config/google-credentials.json
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # 구글 인증 파일은 이미지에 넣지 않고 외부 config/ 폴더를 마운트
      - ./config:/app/config:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: unispace-prometheus
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: unispace-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  mysql-data:
  grafana-data:
